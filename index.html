<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sentinel — Trading Journal</title>
<style>
  :root {
    --bg:#0d1117; --panel:#161b22; --border:#30363d; --text:#e6edf3;
    --muted:#8b949e; --green:#3fb950; --red:#f85149; --accent:#58a6ff;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  .wrap { max-width:1000px; margin:0 auto; padding:32px 20px 64px; }
  header h1 { margin:0 0 2px; font-size:24px; letter-spacing:-0.3px; }
  header .sub { color:var(--muted); font-size:14px; }
  .banner { margin:16px 0; padding:10px 14px; border:1px solid var(--border);
    border-left:3px solid var(--accent); border-radius:6px; background:var(--panel);
    color:var(--muted); font-size:13px; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
    gap:14px; margin:22px 0; }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:10px;
    padding:16px 18px; }
  .card .label { color:var(--muted); font-size:12px; text-transform:uppercase;
    letter-spacing:.5px; }
  .card .value { font-size:24px; font-weight:600; margin-top:6px; }
  .panel { background:var(--panel); border:1px solid var(--border); border-radius:10px;
    padding:18px 20px; margin:22px 0; }
  .panel h2 { margin:0 0 14px; font-size:15px; color:var(--muted); font-weight:600;
    text-transform:uppercase; letter-spacing:.5px; }
  .pos { color:var(--green); } .neg { color:var(--red); }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th,td { text-align:left; padding:9px 8px; border-bottom:1px solid var(--border); }
  th { color:var(--muted); font-weight:500; font-size:12px; text-transform:uppercase; }
  tr.session { cursor:pointer; }
  tr.session:hover { background:#1c2330; }
  td.num { text-align:right; font-variant-numeric:tabular-nums; }
  .detail td { background:#10151c; padding:0; }
  .detail .inner { padding:10px 16px 16px; }
  .detail h4 { margin:10px 0 6px; font-size:12px; color:var(--muted);
    text-transform:uppercase; letter-spacing:.5px; }
  .chip { display:inline-block; padding:1px 7px; border-radius:10px; font-size:11px;
    background:#21262d; color:var(--muted); margin-right:6px; }
  .empty { color:var(--muted); text-align:center; padding:40px; }
  svg text { fill:var(--muted); font-size:11px; }
  a { color:var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🛡️ Sentinel — Trading Journal</h1>
    <div class="sub">Autonomous intraday paper-trading agent · cost-adjusted, risk-caged, journaled</div>
  </header>
  <div id="banner"></div>
  <div id="account"></div>
  <div class="cards" id="cards"></div>
  <div id="scoreboard"></div>
  <div class="panel">
    <h2>Equity curve</h2>
    <div id="chart"></div>
  </div>
  <div class="panel">
    <h2>Sessions</h2>
    <div id="sessions"></div>
  </div>
  <div class="sub" style="text-align:center;color:var(--muted);font-size:12px">
    Generated from the reporting DB via <code>scripts/export_dashboard.py</code>.
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const money = (v) => (v < 0 ? "-$" : "$") + Math.abs(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const signClass = (v) => v > 0 ? "pos" : v < 0 ? "neg" : "";

async function load() {
  for (const src of ["data.json", "data.sample.json"]) {
    try {
      const r = await fetch(src, {cache:"no-store"});
      if (r.ok) { const d = await r.json(); d._src = src; return d; }
    } catch (e) { /* try next */ }
  }
  return null;
}

// Live read from Supabase. The anon key is PUBLIC by design — it can only SELECT
// the dashboard tables (anon read-only RLS); the bot writes with the secret
// service-role key, which never appears here. Falls back to the static data.json.
const SB = {
  url: "https://gtuzjydploqvbzqpnrsf.supabase.co",
  key: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0dXpqeWRwbG9xdmJ6cXBucnNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NzM5OTEsImV4cCI6MjA5MjA0OTk5MX0.W93d-EhmEEFYIlOWjyzXW26vzP65hv7IeisCbETwPPM",
};

async function sbFetch(path) {
  const r = await fetch(`${SB.url}/rest/v1/${path}`,
    { headers: { apikey: SB.key, Authorization: `Bearer ${SB.key}` } });
  if (!r.ok) throw new Error(`supabase ${path}: ${r.status}`);
  return r.json();
}

async function loadFromSupabase() {
  if (!SB.url || !SB.key) return null;
  try {
    const [sessions, trades, vetoes, acct] = await Promise.all([
      sbFetch("sessions?select=*&order=date.asc"),
      sbFetch("trades?select=*"),
      sbFetch("vetoes?select=*"),
      sbFetch("account_snapshots?select=*&order=snapshot_at.desc&limit=1"),
    ]);
    const by = (rows, k) => rows.reduce((m, r) => ((m[r[k]] = m[r[k]] || []).push(r), m), {});
    const tBy = by(trades, "session_date"), vBy = by(vetoes, "session_date");
    const eq = sessions.map(s => +s.ending_equity);
    const closed = trades.filter(t => +t.pnl !== 0);
    const data = {
      _src: "supabase",
      summary: {
        sessions: sessions.length,
        total_net_pnl: sessions.reduce((a, s) => a + (+s.net_pnl || 0), 0),
        latest_equity: eq.length ? eq[eq.length - 1] : 0,
        peak_equity: eq.length ? Math.max(...eq) : 0,
        trades: trades.length,
        win_rate: closed.length ? closed.filter(t => +t.pnl > 0).length / closed.length : 0,
      },
      equity_curve: sessions.map(s => ({ date: s.date, equity: +s.ending_equity })),
      sessions: sessions.map(s => ({ ...s, trades: tBy[s.date] || [], vetoes: vBy[s.date] || [] })),
    };
    if (acct && acct[0]) data.account = { ...acct[0], positions: acct[0].positions || [] };
    // No sessions traded yet: show the real account equity in the cards (not $0)
    // so they match the live Alpaca account panel above.
    if (!sessions.length && data.account) {
      data.summary.latest_equity = +data.account.equity || 0;
      data.summary.peak_equity = +data.account.equity || 0;
    }
    // Latest walk-forward evidence run (optional — never breaks the rest).
    try {
      const ev = await sbFetch("strategy_evidence?select=*&order=id.desc&limit=1");
      data.evidence = ev && ev[0] ? ev[0] : null;
    } catch (e) { data.evidence = null; }
    return data;
  } catch (e) {
    console.warn("Supabase load failed; falling back to static data.json", e);
    return null;
  }
}

function renderBanner(d) {
  if (d._src === "data.sample.json" || d.sample) {
    $("banner").innerHTML = '<div class="banner">⚠️ <b>Sample data</b> — no real trading session has run yet. ' +
      'Run <code>scripts/run_paper_session.py</code> at the market open, then <code>scripts/export_dashboard.py</code> to populate this with real days.</div>';
  }
}

function renderAccount(a) {
  if (!a) { $("account").innerHTML = ""; return; }
  const pos = (a.positions || []).length
    ? (a.positions || []).map(p => `<span class="chip">${p.symbol} ${(+p.qty).toFixed(0)} (${money(+p.market_value)})</span>`).join("")
    : '<span class="sub">flat</span>';
  const when = a.snapshot_at ? new Date(a.snapshot_at).toLocaleString() : "";
  $("account").innerHTML = `<div class="panel">
    <h2>Live Alpaca account <span class="sub" style="text-transform:none;font-weight:400">· snapshot ${when}</span></h2>
    <div class="cards" style="margin:0">
      <div class="card"><div class="label">Equity</div><div class="value">${money(+a.equity)}</div></div>
      <div class="card"><div class="label">Cash</div><div class="value">${money(+a.cash)}</div></div>
      <div class="card"><div class="label">Buying power</div><div class="value">${money(+a.buying_power)}</div></div>
      <div class="card"><div class="label">Portfolio value</div><div class="value">${money(+a.portfolio_value)}</div></div>
    </div>
    <div style="margin-top:12px">${pos}</div>
  </div>`;
}

function renderCards(s) {
  const cards = [
    ["Latest equity", money(s.latest_equity)],
    ["Total net P&L", money(s.total_net_pnl), signClass(s.total_net_pnl)],
    ["Sessions", s.sessions],
    ["Trades", s.trades],
    ["Win rate", (s.win_rate*100).toFixed(1) + "%"],
    ["Peak equity", money(s.peak_equity)],
  ];
  $("cards").innerHTML = cards.map(([label,value,cls]) =>
    `<div class="card"><div class="label">${label}</div><div class="value ${cls||""}">${value}</div></div>`
  ).join("");
}

function renderScoreboard(ev) {
  const el = $("scoreboard");
  if (!el) return;
  if (!ev) { el.innerHTML = ""; return; }
  const fmt = (v, d=2) => (v === null || v === undefined || isNaN(+v)) ? "—" : (+v).toFixed(d);
  const badge = ev.passed
    ? '<span class="chip" style="background:#1b3a26;color:var(--green)">✅ PASS</span>'
    : '<span class="chip" style="background:#3a1d1d;color:var(--red)">❌ FAIL</span>';
  const board = (ev.scoreboard || []).slice()
    .sort((a, b) => (isNaN(+b.sharpe) ? -99 : +b.sharpe) - (isNaN(+a.sharpe) ? -99 : +a.sharpe));
  const rows = board.map(s => {
    const isRL = s.strategy === "rl_agent";
    return `<tr${isRL ? ' style="background:#10151c"' : ''}>
      <td>${isRL ? '🧠 ' : ''}${s.strategy}</td>
      <td class="num">${fmt(s.sharpe)}</td>
      <td class="num ${signClass(+s.total_return)}">${fmt((+s.total_return || 0) * 100, 1)}%</td>
      <td class="num">${fmt((+s.max_drawdown || 0) * 100, 1)}%</td>
      <td class="num">${fmt((+s.win_rate || 0) * 100, 1)}%</td></tr>`;
  }).join("") || '<tr><td colspan="5" class="empty">no strategies</td></tr>';
  const when = ev.generated_at ? new Date(ev.generated_at).toLocaleString() : "";
  const commit = ev.git_commit ? ev.git_commit.slice(0, 7) : "";
  el.innerHTML = `<div class="panel">
    <h2>Strategy scoreboard ${badge}</h2>
    <div class="sub" style="margin:-6px 0 12px;text-transform:none">
      Out-of-sample walk-forward. The RL brain must beat every baseline on Sharpe
      <em>and</em> keep its veto rate under 5% to PASS.${when ? ' · ' + when : ''}${commit ? ' · ' + commit : ''}
    </div>
    <div class="cards" style="margin:0 0 14px">
      <div class="card"><div class="label">RL Sharpe</div><div class="value">${fmt(ev.rl_sharpe)}</div></div>
      <div class="card"><div class="label">Best baseline · ${ev.best_competitor || '—'}</div><div class="value">${fmt(ev.best_competitor_sharpe)}</div></div>
      <div class="card"><div class="label">RL veto rate</div><div class="value">${fmt((+ev.veto_rate || 0) * 100, 1)}%</div></div>
    </div>
    <table>
      <thead><tr><th>Strategy</th><th class="num">Sharpe</th><th class="num">Return</th>
      <th class="num">Max DD</th><th class="num">Win rate</th></tr></thead>
      <tbody>${rows}</tbody></table>
  </div>`;
}

function renderChart(curve) {
  if (!curve || curve.length < 2) { $("chart").innerHTML = '<div class="empty">Not enough sessions to chart yet.</div>'; return; }
  const W=920, H=240, P=36;
  const ys = curve.map(p=>p.equity), lo=Math.min(...ys), hi=Math.max(...ys), span=(hi-lo)||1;
  const x = (i) => P + i*(W-2*P)/(curve.length-1);
  const y = (v) => H-P - ((v-lo)/span)*(H-2*P);
  const pts = curve.map((p,i)=>`${x(i).toFixed(1)},${y(p.equity).toFixed(1)}`).join(" ");
  const area = `${P},${H-P} ${pts} ${W-P},${H-P}`;
  const up = ys[ys.length-1] >= ys[0];
  const col = up ? "var(--green)" : "var(--red)";
  $("chart").innerHTML = `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet">
    <polyline points="${area}" fill="${col}" opacity="0.08" stroke="none"/>
    <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2"/>
    <text x="${P}" y="16">${money(hi)}</text>
    <text x="${P}" y="${H-8}">${money(lo)}</text>
    <text x="${W-P}" y="${H-8}" text-anchor="end">${curve[curve.length-1].date}</text>
    <text x="${P}" y="${H-8}" dx="60">${curve[0].date}</text>
  </svg>`;
}

function renderSessions(sessions) {
  if (!sessions || !sessions.length) { $("sessions").innerHTML = '<div class="empty">No sessions recorded yet.</div>'; return; }
  const rows = [...sessions].reverse().map((s,idx) => {
    const trades = (s.trades||[]).map(t =>
      `<tr><td>${(t.timestamp||"").slice(11,16)}</td><td>${t.side} ${t.symbol}</td>` +
      `<td class="num">${(+t.quantity).toFixed(0)} @ ${(+t.fill_price).toFixed(2)}</td>` +
      `<td class="num ${signClass(+t.pnl)}">${money(+t.pnl)}</td></tr>`).join("") ||
      '<tr><td colspan="4" class="empty" style="padding:12px">no trades</td></tr>';
    const vetoes = (s.vetoes||[]).map(v =>
      `<span class="chip">${v.reason}${v.symbol?" "+v.symbol:""}</span>`).join("") || '<span class="sub">none</span>';
    return `
      <tr class="session" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='table-row'?'none':'table-row'">
        <td>${s.date}</td>
        <td class="num ${signClass(s.net_pnl)}">${money(s.net_pnl)}</td>
        <td class="num">${money(s.ending_equity)}</td>
        <td class="num">${s.trade_count||0}</td>
        <td class="num">${s.veto_count||0}</td>
        <td>${s.halt_status?'<span class="chip" style="color:var(--red)">'+s.halt_status+'</span>':''}</td>
      </tr>
      <tr class="detail" style="display:none"><td colspan="6"><div class="inner">
        <div class="sub">${s.narrative||""}</div>
        <h4>Trades</h4><table>${trades}</table>
        <h4>Vetoes</h4>${vetoes}
      </div></td></tr>`;
  }).join("");
  $("sessions").innerHTML = `<table>
    <thead><tr><th>Date</th><th class="num">Net P&L</th><th class="num">Equity</th>
    <th class="num">Trades</th><th class="num">Vetoes</th><th></th></tr></thead>
    <tbody>${rows}</tbody></table>`;
}

(async () => {
  const d = await loadFromSupabase() || await load();
  if (!d) { document.querySelector(".wrap").innerHTML += '<div class="empty">No data found. Run <code>scripts/export_dashboard.py</code>.</div>'; return; }
  renderBanner(d);
  renderAccount(d.account);
  renderCards(d.summary || {});
  renderScoreboard(d.evidence);
  renderChart(d.equity_curve || []);
  renderSessions(d.sessions || []);
})();
</script>
</body>
</html>
